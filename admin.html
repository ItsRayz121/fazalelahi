<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Fazal Elahi CMS</title>
<meta name="robots" content="noindex,nofollow">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@400;500;600;700&family=DM+Sans:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap">
<style>
:root{--void:#07070F;--deep:#0E0E1C;--surface:rgba(255,255,255,.04);--gold:#F2A900;--emerald:#00D4A0;
  --blue:#3B82F6;--red:#FF3B3B;--white:#fff;--silver:#B0B0C8;--muted:#5A5A78;--border:rgba(242,169,0,.12);
  --head:'Outfit',sans-serif;--body:'DM Sans',sans-serif;--mono:'Space Mono',monospace;--disp:'Bebas Neue',sans-serif}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--void);color:var(--silver);font-family:var(--body);-webkit-font-smoothing:antialiased}
a{color:var(--gold);text-decoration:none}
h1,h2,h3{color:var(--white);font-family:var(--head)}
button{font-family:var(--head);cursor:pointer}
a:focus-visible,button:focus-visible,input:focus-visible,select:focus-visible,textarea:focus-visible{outline:2px solid var(--gold);outline-offset:3px}

/* ---- LOGIN ---- */
#login{position:fixed;inset:0;display:grid;place-items:center;background:radial-gradient(circle at 50% 30%,#12122a,#07070f);z-index:100}
.login-box{background:var(--deep);border:1px solid var(--border);border-radius:20px;padding:42px;width:min(400px,90vw);text-align:center}
.login-box .lock{font-size:46px;margin-bottom:12px}
.login-box h1{font-family:var(--disp);font-size:38px;letter-spacing:1px}
.login-box p{font-size:13px;margin-bottom:22px;color:var(--muted)}
.login-box input{width:100%;background:var(--void);border:1px solid var(--border);border-radius:10px;padding:14px;color:#fff;font-size:15px;margin-bottom:14px}
.login-box button{width:100%;background:var(--gold);color:#000;border:none;border-radius:10px;padding:14px;font-weight:700;font-size:15px}
.err{color:var(--red);font-size:13px;margin-top:10px;min-height:18px}

/* ---- LAYOUT ---- */
#app{display:none;grid-template-columns:250px 1fr;min-height:100vh}
#sidebar{background:var(--deep);border-right:1px solid var(--border);padding:20px 12px;position:sticky;top:0;height:100vh;overflow-y:auto}
.side-brand{font-family:var(--disp);font-size:26px;color:#fff;padding:0 10px 18px;letter-spacing:1px}
.side-brand span{color:var(--gold)}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:9px;color:var(--silver);
  font-family:var(--head);font-weight:500;font-size:14px;cursor:pointer;margin-bottom:2px;border:none;background:none;width:100%;text-align:left;position:relative}
.nav-item:hover{background:var(--surface);color:#fff}
.nav-item.active{background:rgba(242,169,0,.12);color:var(--gold)}
.nav-item .badge{position:absolute;right:10px;background:var(--red);color:#fff;font-size:10px;font-family:var(--mono);padding:1px 6px;border-radius:10px}
#main{padding:30px clamp(16px,3vw,42px);max-width:1100px}
.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:26px;flex-wrap:wrap;gap:12px}
.topbar h2{font-size:26px}
.page-desc{font-size:13px;color:var(--muted);margin-top:3px}

/* ---- COMPONENTS ---- */
.card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:22px;margin-bottom:18px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
label{display:block;font-size:12px;color:var(--silver);margin:12px 0 5px;font-family:var(--head);font-weight:600;text-transform:uppercase;letter-spacing:.5px}
input,select,textarea{width:100%;background:var(--void);border:1px solid var(--border);border-radius:9px;padding:11px 13px;color:#fff;font-family:var(--body);font-size:14px}
textarea{min-height:90px;resize:vertical}
.btn{display:inline-flex;align-items:center;gap:7px;border:none;border-radius:9px;padding:11px 18px;font-weight:700;font-size:14px}
.btn-gold{background:var(--gold);color:#000}
.btn-em{background:var(--emerald);color:#000}
.btn-ghost{background:var(--surface);color:#fff;border:1px solid var(--border)}
.btn-red{background:rgba(255,59,59,.15);color:var(--red);border:1px solid rgba(255,59,59,.3)}
.btn-sm{padding:7px 12px;font-size:12px}
.row-item{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:13px 16px;background:var(--void);
  border:1px solid var(--border);border-radius:10px;margin-bottom:9px}
.row-item .info{flex:1;min-width:0}
.row-item .info strong{color:#fff;font-family:var(--head)}
.row-item .info small{display:block;color:var(--muted);font-size:12px;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.row-actions{display:flex;gap:6px;flex-shrink:0}
.stat-cards{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px;text-align:center}
.stat-card .n{font-family:var(--mono);font-size:30px;color:var(--gold);font-weight:700}
.stat-card .l{font-size:12px;color:var(--silver);margin-top:4px}
.toast{position:fixed;bottom:24px;right:24px;background:var(--emerald);color:#000;padding:14px 22px;border-radius:10px;
  font-weight:700;z-index:200;transform:translateY(120px);transition:.4s}
.toast.show{transform:none}
.muted{color:var(--muted);font-size:13px}
.tag{display:inline-block;background:var(--void);border:1px solid var(--border);border-radius:6px;padding:3px 9px;font-family:var(--mono);font-size:11px;margin:3px 3px 0 0}
.pill-status{font-family:var(--mono);font-size:11px;padding:3px 9px;border-radius:12px}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;place-items:center;z-index:150;padding:20px}
.modal-bg.show{display:grid}
.modal{background:var(--deep);border:1px solid var(--border);border-radius:16px;padding:28px;width:min(640px,95vw);max-height:90vh;overflow-y:auto}
.modal h3{margin-bottom:14px}
.modal-actions{display:flex;gap:10px;margin-top:20px;justify-content:flex-end}
.hidden{display:none!important}
.hamburger{display:none}
.field-help{font-size:11px;color:var(--muted);margin-top:3px}
@media (max-width:820px){
  #app{grid-template-columns:1fr}
  #sidebar{position:fixed;left:0;top:0;width:250px;z-index:90;transform:translateX(-100%);transition:.3s}
  #sidebar.open{transform:none}
  .hamburger{display:inline-flex;background:var(--gold);color:#000;border:none;border-radius:8px;padding:9px 13px;font-weight:700}
  .grid2,.grid4,.stat-cards{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>

<!-- ============ LOGIN ============ -->
<div id="login">
  <div class="login-box">
    <div class="lock">🔒</div>
    <h1>ADMIN ACCESS</h1>
    <p>Fazal Elahi CMS — authorized access only</p>
    <input type="email" id="email" placeholder="Email" autocomplete="username" style="display:none">
    <input type="password" id="pw" placeholder="Enter password" autocomplete="current-password">
    <button id="loginBtn">Unlock Dashboard</button>
    <div class="err" id="loginErr"></div>
    <p style="margin-top:16px;font-size:11px" id="loginHint">Default password: <strong>fazal2026</strong> — change it in Security.</p>
  </div>
</div>

<!-- ============ APP ============ -->
<div id="app">
  <aside id="sidebar">
    <div class="side-brand">FAZAL<span>.</span> CMS</div>
    <nav id="sideNav"></nav>
    <button class="nav-item" id="logoutBtn" style="margin-top:20px;color:var(--red)">🚪 Logout</button>
  </aside>
  <main id="main">
    <div class="topbar">
      <div>
        <button class="hamburger" id="hamburger">☰ Menu</button>
        <h2 id="pageTitle">Dashboard</h2>
        <p class="page-desc" id="pageDesc"></p>
      </div>
      <a class="btn btn-ghost" href="index.html" target="_blank" rel="noopener">👁 Preview Site</a>
    </div>
    <div id="content"></div>
  </main>
</div>

<div class="modal-bg" id="modalBg"><div class="modal" id="modal"></div></div>
<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="data.js"></script>
<script>
(function () {
  'use strict';
  var Store = FAZAL.Store, Util = FAZAL.Util, esc = Util.escape, san = Util.sanitize;
  Store.init();

  /* ============ AUTH ============ */
  var SESSION_KEY = 'fazal_admin_auth';
  var CLOUD = Store.cloudEnabled;
  var inquiriesCache = [];
  function isAuthed() { return sessionStorage.getItem(SESSION_KEY) === 'true'; }

  // Cloud-mode login uses email + password (Supabase Auth); local mode uses password only.
  if (CLOUD) {
    document.getElementById('email').style.display = '';
    document.getElementById('loginHint').innerHTML = '🔐 Cloud mode — sign in with your Supabase admin email &amp; password.';
  }

  async function showApp() {
    document.getElementById('login').style.display = 'none';
    document.getElementById('app').style.display = 'grid';
    if (CLOUD) {
      await Store.bootstrap();
      try {
        var cnt = await Store.cloudCount();
        if (cnt === 0) { var r = await Store.syncAllToCloud(); toast('Cloud initialized: ' + r.msg); }
      } catch (e) {}
      inquiriesCache = await Store.getInquiries();
    }
    buildNav(); route('dashboard');
  }
  function logAttempt(ok) {
    var log = Store.get('fazal_login_log') || [];
    log.unshift({ ts: new Date().toISOString(), result: ok ? 'Pass' : 'Fail' });
    localStorage.setItem('fazal_login_log', JSON.stringify(log.slice(0, 10)));
  }
  async function tryLogin() {
    var pw = document.getElementById('pw').value;
    var errEl = document.getElementById('loginErr');
    if (CLOUD) {
      var email = document.getElementById('email').value.trim();
      errEl.textContent = 'Signing in…';
      var res = await Store.signIn(email, pw);
      if (res.ok) { sessionStorage.setItem(SESSION_KEY, 'true'); logAttempt(true); await showApp(); }
      else { logAttempt(false); errEl.textContent = '❌ ' + (res.msg || 'Login failed'); document.getElementById('pw').value = ''; }
      return;
    }
    var hash = await Util.sha256(pw);
    var stored = localStorage.getItem('fazal_admin_hash') || Store.defaults.fazal_admin_hash;
    if (hash === stored) { sessionStorage.setItem(SESSION_KEY, 'true'); logAttempt(true); showApp(); }
    else { logAttempt(false); errEl.textContent = '❌ Incorrect password.'; document.getElementById('pw').value = ''; }
  }
  document.getElementById('loginBtn').addEventListener('click', tryLogin);
  document.getElementById('pw').addEventListener('keydown', function (e) { if (e.key === 'Enter') tryLogin(); });
  document.getElementById('logoutBtn').addEventListener('click', async function () {
    await Store.signOut(); sessionStorage.removeItem(SESSION_KEY); location.reload();
  });

  // Local-mode only: ensure a REAL SHA-256 hash of the default password "fazal2026".
  if (!CLOUD) {
    (function ensureRealHash() {
      var stored = localStorage.getItem('fazal_admin_hash');
      if (stored === null || stored === Store.defaults.fazal_admin_hash) {
        Util.sha256('fazal2026').then(function (h) { localStorage.setItem('fazal_admin_hash', h); });
      }
    })();
  }

  // Restore an existing session on load.
  (async function restoreSession() {
    if (CLOUD) {
      var session = await Store.cloudSession();
      if (session) { sessionStorage.setItem(SESSION_KEY, 'true'); await showApp(); }
    } else if (isAuthed()) { showApp(); }
  })();

  /* ============ NAV CONFIG ============ */
  var SECTIONS = [
    ['dashboard','🏠 Dashboard'], ['profile','👤 Profile & Stats'], ['roles','🎭 Roles Manager'],
    ['experience','💼 Experience'], ['cases','📋 Case Studies'], ['events','🎪 Events Manager'],
    ['projects','🗂️ Projects'], ['kol','🎯 KOL Network'], ['community','🏘️ Community'],
    ['social','🌐 Social Links'], ['affiliates','🤝 Affiliates'], ['testimonials','💬 Testimonials'],
    ['content','🎥 Content / YouTube'], ['keywords','🔑 Keywords'], ['inquiries','📧 Inquiries'],
    ['settings','⚙️ Site Settings'], ['security','🔒 Security']
  ];
  function inqList() { return CLOUD ? inquiriesCache : Store.get('fazal_inquiries'); }
  function buildNav() {
    var newInq = inqList().filter(function (i) { return i.status === 'New'; }).length;
    document.getElementById('sideNav').innerHTML = SECTIONS.map(function (s) {
      var badge = (s[0] === 'inquiries' && newInq) ? '<span class="badge">' + newInq + '</span>' : '';
      return '<button class="nav-item" data-route="' + s[0] + '">' + s[1] + badge + '</button>';
    }).join('');
    document.querySelectorAll('.nav-item[data-route]').forEach(function (b) {
      b.addEventListener('click', function () { route(b.dataset.route); closeSidebar(); });
    });
  }
  function setActive(r) {
    document.querySelectorAll('.nav-item[data-route]').forEach(function (b) {
      b.classList.toggle('active', b.dataset.route === r);
    });
  }

  /* ============ HELPERS ============ */
  function toast(msg) {
    var t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show');
    setTimeout(function () { t.classList.remove('show'); }, 2200);
  }
  function save(key, val, msg) { Store.set(key, val); toast(msg || 'Saved ✓'); buildNav(); }
  function modal(html) { document.getElementById('modal').innerHTML = html; document.getElementById('modalBg').classList.add('show'); }
  function closeModal() { document.getElementById('modalBg').classList.remove('show'); }
  document.getElementById('modalBg').addEventListener('click', function (e) { if (e.target.id === 'modalBg') closeModal(); });
  window._closeModal = closeModal;
  function val(id) { return document.getElementById(id).value; }
  function list(str) { return (str || '').split(',').map(function (s) { return san(s); }).filter(Boolean); }
  function pageHead(r) {
    var meta = {
      dashboard:'Overview of all content and quick actions', profile:'Edit identity, hero stats, bio and contact info',
      roles:'The seven role cards on the public site', experience:'Work history (full CRUD)',
      cases:'Proof-of-work case studies', events:'All events — pre-loaded, fully editable',
      projects:'Additional projects', kol:'KOL partners, services and markets',
      community:'Community platform cards and features', social:'All social platform links',
      affiliates:'Affiliate partner cards', testimonials:'Client testimonials',
      content:'YouTube channels, videos, pillars and hashtags', keywords:'Keywords and hashtags',
      inquiries:'Contact form submissions', settings:'SEO, maintenance, backup/restore',
      security:'Password, sessions and login log'
    };
    document.getElementById('pageTitle').textContent = SECTIONS.find(function (s) { return s[0] === r; })[1].replace(/^[^ ]+ /, '');
    document.getElementById('pageDesc').textContent = meta[r] || '';
  }

  /* ============ ROUTER ============ */
  function route(r) {
    setActive(r); pageHead(r);
    var c = document.getElementById('content');
    ({
      dashboard: renderDashboard, profile: renderProfile, roles: renderRoles,
      experience: renderExperience, cases: renderCases, events: renderEvents,
      projects: renderProjects, kol: renderKOL, community: renderCommunity,
      social: renderSocial, affiliates: renderAffiliates, testimonials: renderTestimonials,
      content: renderContent, keywords: renderKeywords, inquiries: renderInquiries,
      settings: renderSettings, security: renderSecurity
    }[r])(c);
  }

  /* ============ DASHBOARD ============ */
  function renderDashboard(c) {
    var inq = inqList(), newInq = inq.filter(function (i) { return i.status === 'New'; }).length;
    var act = Store.activity();
    c.innerHTML =
      '<div class="stat-cards">' +
      statCard(Store.get('fazal_events').length, 'Events') +
      statCard(Store.get('fazal_projects').length, 'Projects') +
      statCard(Store.get('fazal_testimonials').length, 'Testimonials') +
      statCard(inq.length + (newInq ? ' (' + newInq + ' new)' : ''), 'Inquiries') + '</div>' +
      '<div class="card"><h3>Quick Actions</h3><div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:12px">' +
      '<button class="btn btn-gold" data-q="events">+ Add Event</button>' +
      '<button class="btn btn-gold" data-q="projects">+ Add Project</button>' +
      '<button class="btn btn-gold" data-q="testimonials">+ Add Testimonial</button>' +
      '<button class="btn btn-gold" data-q="kol">+ Add KOL Partner</button></div></div>' +
      '<div class="card"><h3>Data Sync Health</h3><p class="muted" style="margin-top:8px">🟢 localStorage active — public site reads the same data. Changes appear on reload.</p></div>' +
      '<div class="card"><h3>Recent Activity</h3>' +
      (act.length ? act.map(function (a) { return '<div class="row-item"><div class="info"><strong>' + esc(a.msg) + '</strong><small>' + new Date(a.ts).toLocaleString() + '</small></div></div>'; }).join('')
        : '<p class="muted" style="margin-top:8px">No activity yet.</p>') + '</div>';
    c.querySelectorAll('[data-q]').forEach(function (b) { b.addEventListener('click', function () { route(b.dataset.q); }); });
  }
  function statCard(n, l) { return '<div class="stat-card"><div class="n">' + n + '</div><div class="l">' + l + '</div></div>'; }

  /* ============ PROFILE ============ */
  function renderProfile(c) {
    var p = Store.get('fazal_profile');
    var statFields = p.stats.map(function (s, i) {
      return '<div class="grid2"><input id="sv' + i + '" value="' + esc(s.value) + '" placeholder="Value">' +
        '<input id="sl' + i + '" value="' + esc(s.label) + '" placeholder="Label"></div>';
    }).join('');
    c.innerHTML = '<div class="card">' +
      f('Name','pf_name',p.name) + f('Hero Tagline','pf_tagline',p.tagline) +
      f('Sub-tagline','pf_sub',p.subTagline) + ta('Mission / Hero Body','pf_mission',p.mission) +
      f('Profile Photo URL','pf_photo',p.photo) +
      '<div class="grid2">' + f('Email','pf_email',p.email) + f('Phone / WhatsApp','pf_phone',p.phone) + '</div>' +
      '<div class="grid2">' + f('Location','pf_loc',p.location) + f('Availability','pf_avail',p.availability) + '</div>' +
      f('LinkedIn URL','pf_li',p.linkedin) + f('CV Download URL','pf_cv',p.cvUrl) +
      '<h3 style="margin-top:18px">Hero Stats (8)</h3>' + statFields +
      ta('Bio Paragraph 1','pf_bio1',p.bio1) + ta('Bio Paragraph 2','pf_bio2',p.bio2) + ta('Bio Paragraph 3','pf_bio3',p.bio3) +
      ta('Expertise Tags (comma-separated)','pf_exp',p.expertise.join(', ')) +
      '<button class="btn btn-gold" id="saveProfile" style="margin-top:18px">💾 Save Profile</button></div>';
    document.getElementById('saveProfile').addEventListener('click', function () {
      p.name = san(val('pf_name')); p.tagline = san(val('pf_tagline')); p.subTagline = san(val('pf_sub'));
      p.mission = san(val('pf_mission')); p.photo = san(val('pf_photo')); p.email = san(val('pf_email'));
      p.phone = san(val('pf_phone')); p.location = san(val('pf_loc')); p.availability = san(val('pf_avail'));
      p.linkedin = san(val('pf_li')); p.cvUrl = san(val('pf_cv'));
      p.bio1 = san(val('pf_bio1')); p.bio2 = san(val('pf_bio2')); p.bio3 = san(val('pf_bio3'));
      p.expertise = list(val('pf_exp'));
      p.stats = p.stats.map(function (s, i) { return { value: san(val('sv' + i)), label: san(val('sl' + i)), accent: s.accent }; });
      save('fazal_profile', p, 'Profile saved ✓');
    });
  }

  /* ============ Generic CRUD list builder ============ */
  function crudList(items, opts) {
    // opts: {title(item), sub(item)}
    return items.map(function (it, i) {
      return '<div class="row-item"><div class="info"><strong>' + esc(opts.title(it)) + '</strong><small>' + esc(opts.sub(it)) + '</small></div>' +
        '<div class="row-actions">' +
        (i > 0 ? '<button class="btn btn-ghost btn-sm" data-act="up" data-i="' + i + '">↑</button>' : '') +
        '<button class="btn btn-ghost btn-sm" data-act="edit" data-i="' + i + '">✏️</button>' +
        '<button class="btn btn-red btn-sm" data-act="del" data-i="' + i + '">🗑</button></div></div>';
    }).join('');
  }
  function wireCrud(c, key, opts) {
    c.querySelectorAll('[data-act]').forEach(function (b) {
      b.addEventListener('click', function () {
        var i = +b.dataset.i, arr = Store.get(key);
        if (b.dataset.act === 'del') {
          modal('<h3>Delete this entry?</h3><p class="muted">This cannot be undone.</p>' +
            '<div class="modal-actions"><button class="btn btn-ghost" onclick="_closeModal()">Cancel</button>' +
            '<button class="btn btn-red" id="confDel">Delete</button></div>');
          document.getElementById('confDel').addEventListener('click', function () {
            arr.splice(i, 1); save(key, arr, 'Deleted ✓'); closeModal(); opts.rerender();
          });
        } else if (b.dataset.act === 'up') {
          var t = arr[i]; arr[i] = arr[i - 1]; arr[i - 1] = t; save(key, arr, 'Reordered ✓'); opts.rerender();
        } else if (b.dataset.act === 'edit') { opts.form(arr[i], i); }
      });
    });
  }

  /* ============ ROLES ============ */
  function renderRoles(c) {
    var roles = Store.get('fazal_roles');
    c.innerHTML = '<button class="btn btn-gold" id="add" style="margin-bottom:14px">+ Add Role</button>' +
      crudList(roles, { title: function (r) { return r.icon + ' ' + r.title; }, sub: function (r) { return r.desc; } });
    document.getElementById('add').addEventListener('click', function () { roleForm({ icon:'⭐', title:'', color:'gold', desc:'', visible:true }, -1); });
    wireCrud(c, 'fazal_roles', { rerender: function () { renderRoles(c); }, form: roleForm });
  }
  function roleForm(r, i) {
    var colors = ['gold','blue','red','emerald','purple','orange','pkgreen'];
    modal('<h3>' + (i < 0 ? 'Add' : 'Edit') + ' Role</h3>' +
      f('Icon (emoji)','r_icon',r.icon) + f('Title','r_title',r.title) +
      '<label>Badge Color</label><select id="r_color">' + colors.map(function (col) { return '<option' + (col === r.color ? ' selected' : '') + '>' + col + '</option>'; }).join('') + '</select>' +
      ta('Description','r_desc',r.desc) +
      '<label><input type="checkbox" id="r_vis" ' + (r.visible !== false ? 'checked' : '') + ' style="width:auto"> Visible</label>' +
      modalActions('saveRole'));
    document.getElementById('saveRole').addEventListener('click', function () {
      var arr = Store.get('fazal_roles');

          '<p>' + esc(q.message) + '</p>' +
          '<div class="row-actions" style="margin-top:10px">' +
          '<select data-st="' + i + '">' + ['New','In Review','Replied','Archived'].map(function (s) { return '<option' + (s === q.status ? ' selected' : '') + '>' + s + '</option>'; }).join('') + '</select>' +
          '<button class="btn btn-red btn-sm" data-delq="' + i + '">🗑</button></div></div>';
      }).join('') : '<p class="muted">No inquiries yet.</p>');
    c.querySelectorAll('[data-st]').forEach(function (sel) { sel.addEventListener('change', async function () {
      var q = arr[+sel.dataset.st]; q.status = sel.value;
      await Store.updateInquiry(q.id, sel.value); persistLocal(); toast('Status updated ✓'); buildNav();
    }); });
    c.querySelectorAll('[data-delq]').forEach(function (b) { b.addEventListener('click', async function () {
      var q = arr[+b.dataset.delq]; await Store.deleteInquiry(q.id); arr.splice(+b.dataset.delq, 1);
      persistLocal(); toast('Deleted ✓'); renderInquiries(c);
    }); });
    var ref = document.getElementById('refreshInq');
    if (ref) ref.addEventListener('click', function () { renderInquiries(c); });
    var exp = document.getElementById('exportInq');
    if (exp) exp.addEventListener('click', function () {
      var csv = 'Name,Email,Company,Type,Status,Date,Message\n' + arr.map(function (q) {
        return [q.name, q.email, q.company, q.type, q.status, q.ts, q.message].map(function (v) { return '"' + String(v || '').replace(/"/g, '""') + '"'; }).join(',');
      }).join('\n');
      download('inquiries.csv', csv);
    });
  }

  /* ============ SETTINGS ============ */
  function renderSettings(c) {
    var s = Store.get('fazal_settings');
    c.innerHTML = '<div class="card">' +
      f('Site Title','st_title',s.title) + ta('Meta Description','st_desc',s.description) +
      f('Hero Headline Override','st_hh',s.heroHeadline || '') + f('Hero Sub Override','st_hs',s.heroSub || '') +
      f('Footer Tagline','st_foot',s.footerTagline) + f('Site URL','st_url',s.siteUrl) + f('OG Image URL','st_og',s.ogImage) +
      '<label><input type="checkbox" id="st_maint" ' + (s.maintenance ? 'checked' : '') + ' style="width:auto"> 🚧 Maintenance Mode (public site → Coming Soon)</label>' +
      '<label><input type="checkbox" id="st_disc" ' + (s.showDisclaimer !== false ? 'checked' : '') + ' style="width:auto"> Show "Not financial advice" disclaimer</label>' +
      ta('Custom CSS (injected into public site)','st_css',Store.get('fazal_customcss')) +
      '<button class="btn btn-gold" id="saveSettings" style="margin-top:12px">💾 Save Settings</button></div>' +
      '<div class="card"><h3>☁️ Cloud Sync (Supabase)</h3>' +
      '<p class="muted" style="margin:8px 0">' + (CLOUD ? '🟢 Connected — admin edits go live to all visitors.' : '⚪ Local only — edits stay in this browser.') + '</p>' +
      (CLOUD ? '<button class="btn btn-em" id="pushCloud">⬆ Push all data to cloud</button>' : '') + '</div>' +
      '<div class="card"><h3>Backup &amp; Restore</h3><div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:10px">' +
      '<button class="btn btn-em" id="exportData">⬇ Export All Data (JSON)</button>' +
      '<label class="btn btn-ghost" style="margin:0">⬆ Import JSON<input type="file" id="importData" accept=".json" style="display:none"></label>' +
      '<button class="btn btn-red" id="resetData">↺ Reset to Defaults</button></div></div>';
    document.getElementById('saveSettings').addEventListener('click', function () {
      s.title = san(val('st_title')); s.description = san(val('st_desc')); s.heroHeadline = san(val('st_hh'));
      s.heroSub = san(val('st_hs')); s.footerTagline = san(val('st_foot')); s.siteUrl = san(val('st_url')); s.ogImage = san(val('st_og'));
      s.maintenance = document.getElementById('st_maint').checked; s.showDisclaimer = document.getElementById('st_disc').checked;
      Store.set('fazal_customcss', val('st_css')); save('fazal_settings', s, 'Settings saved ✓');
    });
    var pushBtn = document.getElementById('pushCloud');
    if (pushBtn) pushBtn.addEventListener('click', async function () {
      pushBtn.textContent = 'Pushing…'; var r = await Store.syncAllToCloud();
      toast(r.ok ? ('✓ ' + r.msg) : ('❌ ' + r.msg)); pushBtn.textContent = '⬆ Push all data to cloud';
    });
    document.getElementById('exportData').addEventListener('click', function () {
      var d = new Date().toISOString().slice(0, 10);
      download('fazal-backup-' + d + '.json', JSON.stringify(Store.exportAll(), null, 2));
    });
    document.getElementById('importData').addEventListener('change', function (e) {
      var file = e.target.files[0]; if (!file) return;
      var reader = new FileReader();
      reader.onload = function () {
        try { Store.importAll(JSON.parse(reader.result)); toast('Imported ✓'); renderSettings(c); buildNav(); }
        catch (err) { toast('❌ Invalid JSON'); }
      };
      reader.readAsText(file);
    });
    document.getElementById('resetData').addEventListener('click', function () {
      modal('<h3>⚠️ Reset ALL data to defaults?</h3><p class="muted">This wipes every change and restores the original content. Type RESET to confirm.</p>' +
        '<input id="resetConf" placeholder="Type RESET">' + modalActions('confReset', 'Reset Everything', 'btn-red'));
      document.getElementById('confReset').addEventListener('click', function () {
        if (val('resetConf') === 'RESET') { Store.resetAll(); toast('Reset complete ✓'); closeModal(); renderSettings(c); buildNav(); }
        else toast('❌ Type RESET exactly');
      });
    });
  }

  /* ============ SECURITY ============ */
  function renderSecurity(c) {
    var log = Store.get('fazal_login_log') || [];
    c.innerHTML = '<div class="card"><h3>Change Password</h3>' +
      f('New Password','sec_pw','') + f('Confirm Password','sec_pw2','') +
      '<button class="btn btn-gold" id="changePw" style="margin-top:10px">🔑 Update Password</button>' +
      '<p class="field-help">Stored as SHA-256 hash. Plain text is never saved.</p></div>' +
      '<div class="card"><h3>Session</h3><label>Session Timeout</label>' +
      '<select id="sec_timeout"><option>30 min</option><option>60 min</option><option>2 hrs</option><option selected>Never</option></select>' +
      '<button class="btn btn-red" id="forceLogout" style="margin-top:12px">🚪 Force Logout (clear session)</button>' +
      '<p class="field-help">Tip: enable 2FA on your hosting platform (Netlify / Vercel / Cloudflare) for an extra layer.</p></div>' +
      '<div class="card"><h3>Login Attempt Log (last 10)</h3>' +
      (log.length ? log.map(function (l) { return '<div class="row-item"><div class="info"><strong style="color:' + (l.result === 'Pass' ? 'var(--emerald)' : 'var(--red)') + '">' + l.result + '</strong><small>' + new Date(l.ts).toLocaleString() + '</small></div></div>'; }).join('') : '<p class="muted">No logins recorded.</p>') + '</div>';
    document.getElementById('changePw').addEventListener('click', async function () {
      var pw = val('sec_pw'), pw2 = val('sec_pw2');
      if (pw.length < 6) return toast('❌ Min 6 characters');
      if (pw !== pw2) return toast('❌ Passwords do not match');
      if (CLOUD) {
        var r = await Store.updatePassword(pw);
        toast(r.ok ? 'Password updated ✓' : ('❌ ' + r.msg));
      } else {
        var hash = await Util.sha256(pw); localStorage.setItem('fazal_admin_hash', hash); toast('Password updated ✓');
      }
      document.getElementById('sec_pw').value = ''; document.getElementById('sec_pw2').value = '';
    });
    document.getElementById('forceLogout').addEventListener('click', function () { sessionStorage.removeItem(SESSION_KEY); location.reload(); });
  }

  /* ============ FORM HELPERS ============ */
  function f(label, id, value) { return '<label>' + label + '</label><input id="' + id + '" value="' + esc(value || '') + '">'; }
  function ta(label, id, value) { return '<label>' + label + '</label><textarea id="' + id + '">' + esc(value || '') + '</textarea>'; }
  function modalActions(saveId, saveLabel, cls) {
    return '<div class="modal-actions"><button class="btn btn-ghost" onclick="_closeModal()">Cancel</button>' +
      '<button class="btn ' + (cls || 'btn-gold') + '" id="' + saveId + '">' + (saveLabel || 'Save') + '</button></div>';
  }
  function download(name, content) {
    var blob = new Blob([content], { type: 'text/plain' });
    var a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = name; a.click();
    URL.revokeObjectURL(a.href);
  }

  /* ============ MOBILE SIDEBAR ============ */
  function closeSidebar() { document.getElementById('sidebar').classList.remove('open'); }
  document.getElementById('hamburger').addEventListener('click', function () { document.getElementById('sidebar').classList.toggle('open'); });
})();
</script>
</body>
</html>
